<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabFood Location Picker</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        #map {
            height: 600px;
            width: 100%;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col">

    <div class="bg-white shadow p-4 flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-green-600">GrabFood Explorer</h1>

        <!-- Search Bar -->
        <div class="flex-1 mx-4">
            <input type="text" id="search-input" placeholder="Search (e.g. Pizza, KFC)..."
                class="w-full px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-green-500"
                onkeypress="handleEnter(event)">
        </div>

        <div class="flex items-center space-x-4">
            <span id="coords" class="text-sm text-gray-500">Pick a location on the map</span>
            <button onclick="refreshTokens()" id="btn-refresh"
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm">
                Refresh Tokens (Selenium)
            </button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-1/3 bg-white border-r overflow-y-auto p-4" id="sidebar">
            <h2 class="font-semibold mb-4 text-lg">Restaurants Nearby</h2>
            <div id="results" class="space-y-4">
                <p class="text-gray-500 text-center mt-10">Select a location on the map to load restaurants.</p>
            </div>
            <div id="loading" class="hidden flex justify-center mt-10">
                <div class="loader"></div>
            </div>
        </div>

        <!-- Map -->
        <div class="w-2/3 relative">
            <div id="map" class="h-full"></div>
            <button onclick="searchHere()" id="btn-search"
                class="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-lg z-[1000] hidden">
                Search Here
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Init map - start with a default view (KL)
        const map = L.map('map').setView([3.140853, 101.693207], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let currentMarker = null;   // The "Picker" pin
        let restaurantLayers = []; // Store restaurant markers to clear them later
        let selectedLat = null;
        let selectedLng = null;

        // Icons
        const pickerIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Event: Click on map to move pin
        map.on('click', function (e) {
            const { lat, lng } = e.latlng;
            updateLocation(lat, lng);
        });

        // Auto-Locate on Load
        window.onload = function () {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        console.log("Auto-located:", lat, lng);

                        // Center map and set pin
                        map.setView([lat, lng], 15);
                        updateLocation(lat, lng);

                        // Auto-search
                        searchHere();
                    },
                    (error) => {
                        console.log("Geolocation denied or failed. Using default.");
                    }
                );
            }
        };

        function updateLocation(lat, lng) {
            selectedLat = lat;
            selectedLng = lng;

            document.getElementById('coords').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('btn-search').classList.remove('hidden');

            if (currentMarker) {
                map.removeLayer(currentMarker);
            }

            // Create draggable marker
            currentMarker = L.marker([lat, lng], {
                icon: pickerIcon,
                draggable: true
            }).addTo(map);

            // Refresh on drag end
            currentMarker.on('dragend', function (event) {
                const marker = event.target;
                const position = marker.getLatLng();
                updateLocation(position.lat, position.lng);
                searchHere(); // Auto-refresh when dropped
            });
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                searchHere();
            }
        }

        // Determine API Base URL
        const API_BASE_URL = window.location.protocol === 'file:'
            ? 'http://127.0.0.1:5001'
            : '';

        async function refreshTokens() {
            if (!selectedLat) {
                alert("Please pick a location first.");
                return;
            }

            const btn = document.getElementById('btn-refresh');
            const originalText = btn.textContent;
            btn.textContent = "Refreshing... (Takes ~10s)";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/refresh-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: selectedLat, lng: selectedLng })
                });

                const data = await res.json();
                if (res.ok) {
                    alert("Tokens refreshed successfully! Now try searching.");
                } else {
                    alert("Failed to refresh: " + (data.error || data.message));
                }
            } catch (err) {
                alert("Error connecting to server. Is python server.py running?");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function searchHere() {
            if (!selectedLat) return;

            const keyword = document.getElementById('search-input').value || 'food';
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            resultsDiv.innerHTML = '';
            loadingDiv.classList.remove('hidden');

            // Clear existing restaurant markers
            restaurantLayers.forEach(layer => map.removeLayer(layer));
            restaurantLayers = [];

            try {
                const url = `${API_BASE_URL}/api/restaurants?lat=${selectedLat}&lng=${selectedLng}&keyword=${encodeURIComponent(keyword)}`;
                const res = await fetch(url);
                const data = await res.json();

                loadingDiv.classList.add('hidden');

                if (res.status === 401) {
                    resultsDiv.innerHTML = `
                        <div class="p-4 bg-red-100 text-red-700 rounded">
                            <p class="font-bold">Unauthorized</p>
                            <p class="text-sm">Tokens expired or missing. Please click <b>Refresh Tokens</b> above.</p>
                        </div>
                    `;
                    return;
                }

                if (data.restaurants) {
                    const merchants = data.restaurants;
                    if (merchants.length === 0) {
                        resultsDiv.innerHTML = '<p class="text-center text-gray-500">No restaurants found nearby.</p>';
                        return;
                    }

                    merchants.forEach(m => {
                        const rating = m.rating ? `⭐ ${m.rating}` : 'New';
                        const cuisine = m.cuisine ? m.cuisine.join(', ') : '';
                        const isOpen = m.status === 'OPENED' ? 'Yes' : 'No';
                        const photoUrl = m.photo || 'https://via.placeholder.com/50';

                        // New fields
                        const distance = m.distance ? `${m.distance} km` : '';
                        const price = m.price ? '$'.repeat(m.price) : '';

                        // List Item
                        const item = `
                            <div class="border rounded p-3 hover:bg-gray-50 bg-white shadow-sm transition group cursor-pointer" onclick="highlightMarker('${m.id}')">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-gray-800 text-base group-hover:text-green-600">${m.name}</h3>
                                    <div class="text-right">
                                        <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded font-medium block mb-1">${rating}</span>
                                        <span class="text-xs text-gray-500 font-medium">${distance}</span>
                                    </div>
                                </div>
                                <p class="text-sm text-gray-500 mt-1 truncate">${cuisine} • <span class="text-green-600">${price}</span></p>
                                <div class="flex justify-between items-center mt-3">
                                   <p class="text-xs text-gray-400">Open: <span class="${isOpen === 'Yes' ? 'text-green-600' : 'text-red-500'} font-bold">${isOpen}</span></p>
                                   <a href="${m.link}" target="_blank" class="text-xs text-blue-500 hover:text-blue-700 font-medium border border-blue-500 rounded px-2 py-1 hover:bg-blue-50">View Menu ↗</a>
                                </div>
                            </div>
                        `;
                        resultsDiv.innerHTML += item;

                        // Map Marker (Custom Image)
                        if (m.latitude && m.longitude) {
                            const icon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-image: url('${photoUrl}'); width: 40px; height: 40px; background-size: cover; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            });

                            const marker = L.marker([m.latitude, m.longitude], { icon: icon })
                                .bindPopup(`<b>${m.name}</b><br>${rating} • ${price}<br>${distance}<br><a href="${m.link}" target="_blank">Order Here</a>`);

                            // Store ID for highlighting
                            marker._id = m.id;

                            marker.addTo(map);
                            restaurantLayers.push(marker);
                        }
                    });
                } else {
                    resultsDiv.innerHTML = `<p class="text-red-500">Error: Unexpected API response format.</p>`;
                    console.log(data);
                }

            } catch (err) {
                loadingDiv.classList.add('hidden');
                resultsDiv.innerHTML = `<p class="text-red-500">Failed to fetch data. Is server running?</p>`;
                console.error(err);
            }
        }

        function highlightMarker(id) {
            const marker = restaurantLayers.find(m => m._id === id);
            if (marker) {
                marker.openPopup();
                map.panTo(marker.getLatLng());
            }
        }
    </script>
</body>

</html>
